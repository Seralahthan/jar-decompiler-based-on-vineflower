apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: jar-decompiler-hpa
  namespace: jar-decompiler
  labels:
    app.kubernetes.io/name: jar-decompiler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: jar-decompiler
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
