apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jar-decompiler-ingress
  namespace: jar-decompiler
  labels:
    app.kubernetes.io/name: jar-decompiler
  annotations:
    # Sticky sessions via nginx ingress controller cookie
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "JAR_DECOMPILER_AFFINITY"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "3600"
    nginx.ingress.kubernetes.io/session-cookie-path: "/"
    # Allow large JAR uploads (200MB max)
    nginx.ingress.kubernetes.io/proxy-body-size: "200m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
spec:
  ingressClassName: nginx
  rules:
    - host: jar-decompiler.internal.example.com  # Replace with your internal DNS
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jar-decompiler-svc
                port:
                  number: 80
