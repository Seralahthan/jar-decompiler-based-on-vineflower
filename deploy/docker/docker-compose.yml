services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped

  jar-decompiler:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    platform: ${PLATFORM:-linux/arm64}
    mem_limit: ${MEM_LIMIT:-6g}
    cpus: "${CPUS:-4}"
    ports:
      - "${HOST_PORT:-9090}:${HOST_PORT:-9090}"
    environment:
      - HOST_PORT=${HOST_PORT:-9090}
      # Point to the dedicated Redis container instead of the bundled one
      - REDIS_URL=redis://redis:6379/0
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-4}
      - GUNICORN_THREADS=${GUNICORN_THREADS:-4}
      - FULL_DECOMPILE_POOL_TOTAL=${FULL_DECOMPILE_POOL_TOTAL:-2}
      - CLASS_DECOMPILE_POOL_TOTAL=${CLASS_DECOMPILE_POOL_TOTAL:-8}
    volumes:
      - uploads:/app/uploads
      - output:/app/output
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  uploads:
  output:
  redis-data:
