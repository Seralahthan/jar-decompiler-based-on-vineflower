apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: jar-decompiler-hpa
  namespace: jar-decompiler
  labels:
    app.kubernetes.io/name: jar-decompiler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: jar-decompiler
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
