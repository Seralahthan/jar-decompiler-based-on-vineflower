apiVersion: v1
kind: Service
metadata:
  name: jar-decompiler-svc
  namespace: jar-decompiler
  labels:
    app.kubernetes.io/name: jar-decompiler
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  # Service-level session affinity ensures requests from the same client
  # are routed to the same pod (sticky sessions).  This is required because
  # uploaded JARs and decompiled output live on the pod's local filesystem.
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
  selector:
    app.kubernetes.io/name: jar-decompiler
  ports:
    - port: 80
      targetPort: 9090
