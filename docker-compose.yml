services:
  jar-decompiler:
    build: .
    platform: ${PLATFORM:-linux/arm64}
    mem_limit: ${MEM_LIMIT:-3g}
    cpus: "${CPUS:-4}"
    ports:
      - "${HOST_PORT:-9090}:${HOST_PORT:-9090}"
    environment:
      - HOST_PORT=${HOST_PORT:-9090}
    volumes:
      # Persist uploads and output across container restarts
      - uploads:/app/uploads
      - output:/app/output

volumes:
  uploads:
  output:
